name: Post Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL del entorno a validar (ej: https://app.example.com)
        required: true
        type: string

jobs:
  smoke-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run API smoke tests
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
        run: npm run smoke:api
